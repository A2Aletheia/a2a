remote_theme: just-the-docs/just-the-docs

title: "@a2aletheia/a2a"
description: Aletheia trust-layer wrapper for the A2A (Agent-to-Agent) protocol

baseurl: "/a2a"
url: "https://a2aletheia.github.io"

plugins:
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

search_enabled: true
nav_enabled: true

collections:
  guides:
    permalink: /:collection/:path/
    output: true
  api:
    permalink: /:collection/:path/
    output: true

defaults:
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "api"
    values:
      layout: "default"

aux_links:
  "GitHub": "https://github.com/A2Aletheia/a2a"
  "npm": "https://www.npmjs.com/package/@a2aletheia/a2a"

aux_links_new_tab: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
